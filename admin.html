<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>almentor – Media Vault (Admin)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F5F5;--s1:#FFFFFF;--s2:#F0F0F0;--s3:#E8E8E8;--b1:#E0E0E0;--b2:#CCCCCC;--acc:#E50914;--acc2:rgba(229,9,20,0.08);--t1:#1A1A1A;--t2:#555555;--t3:#888888;--sw:220px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}

/* ── SIDEBAR ─────────────────── */
.sidebar{width:var(--sw);min-height:100vh;background:#1A1A1A;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:20}
.logo{padding:20px 16px 16px;border-bottom:1px solid #2a2a2a;display:flex;flex-direction:column;align-items:flex-start}
.logo-svg{height:22px;margin-bottom:8px;fill:#fff}
.logo-sub{font-size:9.5px;color:#666;letter-spacing:1.5px;text-transform:uppercase}
.nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-group{margin-bottom:6px}
.nav-label{font-size:9.5px;font-weight:600;color:#666;letter-spacing:1.8px;text-transform:uppercase;padding:0 8px;margin:16px 0 6px}
.nav-label:first-child{margin-top:0}
.ni{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:#999;font-weight:400;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:#252525;color:#fff}
.ni.active{background:rgba(229,9,20,0.15);color:#E50914;font-weight:500}
.ni .ic{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ni .badge{margin-left:auto;font-size:10px;background:#2a2a2a;padding:1px 7px;border-radius:20px;color:#666}
.ni.active .badge{background:rgba(229,9,20,0.15);color:#E50914}
.sidebar-foot{padding:16px;border-top:1px solid #2a2a2a}
.add-asset-btn{width:100%;background:#E50914;color:#fff;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s}
.add-asset-btn:hover{opacity:.85}

/* ── MAIN ─────────────────── */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:10;background:rgba(245,245,245,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--b1);padding:14px 26px;display:flex;align-items:center;gap:14px}
.page-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;flex-shrink:0}
.search-wrap{flex:1;max-width:380px;position:relative}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3)}
.search{width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:8px;color:var(--t1);font-size:13px;padding:8px 12px 8px 34px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--b2)}
.search::placeholder{color:var(--t3)}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.sort-sel{background:var(--s1);border:1px solid var(--b1);border-radius:7px;color:var(--t2);font-size:12px;padding:7px 10px;outline:none}

.chips{padding:12px 26px;display:flex;gap:7px;border-bottom:1px solid var(--b1);flex-wrap:wrap}
.chip{padding:5px 13px;border-radius:20px;border:1px solid var(--b1);font-size:12px;color:var(--t3);cursor:pointer;background:none;transition:all .15s}
.chip:hover{border-color:var(--b2);color:var(--t1)}
.chip.on{border-color:var(--acc);color:var(--acc);background:var(--acc2)}

.content{padding:22px 26px;flex:1}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:22px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px 16px}
.stat-n{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--t1)}
.stat-l{font-size:11px;color:var(--t3);margin-top:2px}
.meta-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.result-txt{font-size:12px;color:var(--t3)}
.view-toggle{display:flex;gap:4px}
.vt{background:var(--s1);border:1px solid var(--b1);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--t3);cursor:pointer;transition:all .15s}
.vt.on{background:var(--s2);color:var(--t1);border-color:var(--b2)}

/* ── GRID ─────────────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.card{background:var(--s1);border:none;border-radius:14px;overflow:hidden;transition:all .25s ease;animation:fadeUp .35s ease;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.15)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:var(--b2);transform:translateY(-2px)}
.thumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.thumb-bg{position:absolute;inset:0;opacity:.18;background:radial-gradient(circle at 30% 20%, rgba(255,255,255,.4) 0%, transparent 60%)}
.thumb-proj{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}
.thumb-anim-basic{background:linear-gradient(135deg,#2d1b69 0%,#6b3fa0 50%,#8b5cf6 100%)}
.thumb-anim-mid{background:linear-gradient(135deg,#3b1d8e 0%,#7c3aed 50%,#a78bfa 100%)}
.thumb-anim-adv{background:linear-gradient(135deg,#1e1145 0%,#4c1d95 50%,#7c3aed 100%)}
.thumb-collage-mid{background:linear-gradient(135deg,#78350f 0%,#b45309 50%,#f59e0b 100%)}
.thumb-collage-adv{background:linear-gradient(135deg,#7c2d12 0%,#c2410c 50%,#ea580c 100%)}
.thumb-instructor{background:linear-gradient(135deg,#064e3b 0%,#047857 50%,#10b981 100%)}
.thumb-drama-mid{background:linear-gradient(135deg,#1e3a5f 0%,#1d4ed8 50%,#3b82f6 100%)}
.thumb-drama-adv{background:linear-gradient(135deg,#1e1b4b 0%,#3730a3 50%,#4f46e5 100%)}
.thumb-motion{background:linear-gradient(135deg,#831843 0%,#be185d 50%,#ec4899 100%)}
.thumb-promo{background:linear-gradient(135deg,#7c2d12 0%,#ea580c 50%,#fb923c 100%)}
.thumb-ai{background:linear-gradient(135deg,#134e4a 0%,#0891b2 50%,#06b6d4 100%)}
.thumb-show{background:linear-gradient(135deg,#4a044e 0%,#9333ea 50%,#a855f7 100%)}
.thumb svg{opacity:.35;transition:opacity .2s;width:34px;height:34px}
.card:hover .thumb svg{opacity:.5}
.cat-tag{position:absolute;top:9px;left:9px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;letter-spacing:.3px}
.star-tag{position:absolute;top:9px;right:9px;font-size:10px;padding:3px 8px;border-radius:5px;background:rgba(255,196,0,.15);color:#FFC400;border:1px solid rgba(255,196,0,.25)}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s}
.card:hover .overlay{background:rgba(0,0,0,.35)}
.play{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8);transition:all .2s}
.card:hover .play{opacity:1;transform:scale(1)}
.play svg{margin-left:2px}
.cbody{padding:13px 14px}
.ctitle{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:8px;line-height:1.45}
.ctags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.tag{font-size:10.5px;padding:3px 8px;border-radius:4px;background:var(--s2);color:var(--t3);border:1px solid var(--b1)}
.cfoot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--b1);padding-top:10px}
.yr{font-size:11px;color:var(--t3)}
.cfoot-actions{display:flex;gap:5px;align-items:center}
.copy-btn{font-size:11.5px;color:var(--acc);background:var(--acc2);border:none;padding:5px 10px;border-radius:6px;display:flex;align-items:center;gap:5px;transition:opacity .15s}
.copy-btn:hover{opacity:.8}
.edit-btn{font-size:11.5px;color:var(--t2);background:var(--s2);border:1px solid var(--b1);padding:5px 8px;border-radius:6px;display:flex;align-items:center;gap:4px;transition:all .15s}
.edit-btn:hover{color:var(--t1);border-color:var(--b2)}
.del-btn{font-size:11.5px;color:#999;background:none;border:1px solid var(--b1);padding:5px 8px;border-radius:6px;display:flex;align-items:center;transition:all .15s}
.del-btn:hover{color:#E50914;border-color:#E50914;background:rgba(229,9,20,.06)}
.empty{text-align:center;padding:80px 20px;grid-column:1/-1}
.empty svg{opacity:.15;margin-bottom:12px}
.empty p{font-size:13px;color:var(--t3)}

/* ── MODAL ─────────────────── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.mbg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:26px;width:420px;max-width:95vw;animation:mIn .25s ease}
@keyframes mIn{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.mtitle{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.mclose{background:none;border:none;color:var(--t3);font-size:18px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background .15s}
.mclose:hover{background:var(--s2);color:var(--t1)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--t3);margin-bottom:5px;font-weight:500;letter-spacing:.4px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc)}
.field select option{background:var(--s1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.star-check{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--s2);border:1px solid var(--b1);border-radius:8px}
.star-check input[type=checkbox]{width:15px;height:15px;accent-color:var(--acc)}
.star-check span{font-size:13px;color:var(--t2)}
.mactions{display:flex;gap:10px;margin-top:22px}
.mcancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--b1);background:none;color:var(--t2);font-size:13px;transition:background .15s}
.mcancel:hover{background:var(--s2)}
.msave{flex:2;padding:10px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:13px;font-weight:500;transition:opacity .15s}
.msave:hover{opacity:.88}

/* ── CATEGORY COLORS ─────── */
.c-proj{background:rgba(229,9,20,.15);color:#E50914}
.c-anim-basic{background:rgba(139,92,246,.15);color:#A78BFA}
.c-anim-mid{background:rgba(167,92,246,.18);color:#B794F6}
.c-anim-adv{background:rgba(109,40,217,.2);color:#8B5CF6}
.c-collage-mid{background:rgba(245,158,11,.15);color:#F59E0B}
.c-collage-adv{background:rgba(234,88,12,.18);color:#EA580C}
.c-instructor{background:rgba(16,185,129,.15);color:#10B981}
.c-drama-mid{background:rgba(59,130,246,.15);color:#3B82F6}
.c-drama-adv{background:rgba(37,99,235,.2);color:#2563EB}
.c-motion{background:rgba(236,72,153,.15);color:#EC4899}
.c-promo{background:rgba(251,146,60,.15);color:#FB923C}
.c-ai{background:rgba(6,182,212,.15);color:#06B6D4}
.c-show{background:rgba(168,85,247,.15);color:#A855F7}

/* ── PREVIEW MODAL ─────── */
.preview-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.preview-bg.open{display:flex}
.preview-box{background:#111;border-radius:14px;width:720px;max-width:95vw;animation:mIn .25s ease;overflow:hidden}
.preview-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #333}
.preview-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-close{background:none;border:none;color:#999;font-size:18px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;transition:background .15s}
.preview-close:hover{background:#333;color:#fff}
.preview-frame{width:100%;aspect-ratio:16/9;border:none}
.preview-nolink{padding:60px 20px;text-align:center;color:#666;font-size:13px}
.preview-desc{padding:12px 18px;color:#aaa;font-size:12px;border-top:1px solid #222;line-height:1.5}
.preview-tags{padding:8px 18px 14px;display:flex;gap:5px;flex-wrap:wrap}
.preview-tags .tag{background:#222;border-color:#333;color:#888}

/* ── LOGIN GATE ─────── */
.login-overlay{position:fixed;inset:0;background:#1A1A1A;z-index:9999;display:flex;align-items:center;justify-content:center}
.login-overlay.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:40px 36px;width:360px;max-width:90vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-box .logo-svg{height:26px;fill:#1A1A1A;margin-bottom:6px}
.login-box .logo-sub{font-size:10px;color:#888;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px}
.login-box h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;color:#1A1A1A}
.login-box p{font-size:13px;color:#888;margin-bottom:22px}
.login-input{width:100%;padding:11px 14px;border:1px solid #E0E0E0;border-radius:8px;font-size:14px;outline:none;text-align:center;letter-spacing:2px;transition:border-color .15s}
.login-input:focus{border-color:#E50914}
.login-input.error{border-color:#E50914;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.login-btn{width:100%;padding:11px;border:none;border-radius:8px;background:#E50914;color:#fff;font-size:14px;font-weight:500;margin-top:14px;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.88}
.login-error{font-size:12px;color:#E50914;margin-top:10px;min-height:16px}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">

    <div class="logo-sub">MEDIA VAULT — ADMIN</div>
    <h2>Admin Access</h2>
    <p>Enter the admin code to manage assets</p>
    <input class="login-input" id="loginPass" type="password" placeholder="Admin Code" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Enter</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- SIDEBAR -->

<!-- MODAL -->
<div class="mbg" id="mbg">
  <div class="modal">
    <div class="mhead">
      <div class="mtitle" id="modal-title">Add New Asset</div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="field"><label>Title</label><input id="mTitle" placeholder="e.g. Luxury Villa Tour – North Coast"></div>
    <div class="row2">
      <div class="field"><label>Category</label>
        <select id="mCat">
          <option value="">— Select —</option>
          <option>Projects</option>
          <option>Basic Animation</option><option>Medium Animation</option><option>Advanced Animation</option>
          <option>Medium Collage</option><option>Advanced Collage</option>
          <option>Instructor Led</option>
          <option>Medium Drama</option><option>Advanced Drama</option>
          <option>Motion Graphics</option>
          <option>Promos</option><option>AI Videos</option><option>Showreel</option>
        </select>
      </div>
      <div class="field"><label>Year</label>
        <select id="mYear">
          <option>2030</option><option>2029</option><option>2028</option><option>2027</option><option>2026</option>
          <option selected>2025</option><option>2024</option><option>2023</option><option>2022</option>
          <option>2021</option><option>2020</option><option>2019</option><option>2018</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Format</label>
      <select id="mFmt">
        <option value="">— Select —</option>
        <option>Corporate Film</option><option>Reel</option><option>Testimonial</option>
        <option>Product Video</option><option>Event Coverage</option><option>Animation</option>
        <option>Promo</option><option>Tutorial</option><option>Documentary</option>
      </select>
    </div>
    <div class="field"><label>Embed / Share Link (OneDrive, Vimeo, YouTube)</label><input id="mLink" placeholder="https://…" oninput="autoFillThumb()"></div>
    <div class="field"><label>Thumbnail Image URL (auto-filled from YouTube/Vimeo)</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="mThumb" placeholder="https://… or leave blank for auto-detect" style="flex:1">
        <div id="mThumbPreview" style="width:64px;height:36px;border-radius:4px;background:var(--s2);border:1px solid var(--b1);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center">
          <svg width="16" height="16" fill="none" stroke="#ccc" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
      </div>
    </div>
    <div class="field"><label>Tags (comma separated)</label><input id="mTags" placeholder="e.g. real estate, luxury, north coast"></div>
    <div class="field"><label>Description</label><textarea id="mDesc" rows="2" placeholder="Brief description of the asset…"></textarea></div>
    <div class="star-check">
      <input type="checkbox" id="mStar">
      <span>⭐ Mark as Best for Proposals</span>
    </div>
    <div class="mactions">
      <button class="mcancel" onclick="closeModal()">Cancel</button>
      <button class="msave" id="msave" onclick="saveAsset()">Save Asset</button>
    </div>
  </div>
</div>

<!-- BANNER SETTINGS MODAL -->
<div class="mbg" id="bannerBg" style="display:none">
  <div class="modal" style="max-width:480px">
    <div class="mhead">
      <div class="mtitle">Banner Settings</div>
      <button class="mclose" onclick="closeBannerSettings()">✕</button>
    </div>
    <div class="field"><label>Banner Image URL</label><input id="bannerUrl" placeholder="https://raw.githubusercontent.com/…/banner.jpg"><p style="font-size:11px;color:#888;margin-top:4px">Upload the image to GitHub repo, then paste the raw URL here</p></div>
    <div class="field"><label>Banner Title</label><input id="bannerTitle" value="Production Library" placeholder="Production Library"></div>
    <div class="field"><label>Banner Subtitle</label><input id="bannerSubtitle" value="Browse, preview & download production assets" placeholder="Browse, preview & download…"></div>
    <div id="bannerPreview" style="margin:12px 0;border-radius:10px;overflow:hidden;height:120px;background:#1a1a2e;position:relative">
      <div style="position:absolute;bottom:10px;left:14px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-shadow:0 1px 6px rgba(0,0,0,.5)" id="bannerPreviewTitle">Production Library</div>
    </div>
    <div class="mactions">
      <button class="mcancel" onclick="closeBannerSettings()">Cancel</button>
      <button class="msave" onclick="saveBannerSettings()">Save Banner</button>
    </div>
  </div>
</div>

/* ── GitHub API Config ─── */
const GH_OWNER = 'almentor-production';
const GH_REPO  = 'almentor-production';
const GH_FILE  = 'data.json';
const GH_API   = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;
const GH_RAW   = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_FILE}`;
const GH_TOKEN = localStorage.getItem('mv-gh-token') || '';

let data = [], activeCat = 'all', activeYr = 'all';
let saving = false;
let fileSha = '';  // needed by GitHub API to update the file
let isDirty = false; // true if local changes haven't synced to GitHub yet

/* ── Token setup (one-time) ─── */
function setupToken() {
  const t = prompt('Paste your GitHub Personal Access Token here.\nThis is stored in your browser only and never shared.');
  if (t && t.trim()) {
    localStorage.setItem('mv-gh-token', t.trim());
    location.reload();
  }
}

function getToken() {
  return localStorage.getItem('mv-gh-token') || '';
}

async function load() {
  const token = getToken();
  let loaded = false;
  const hasDirtyLocal = localStorage.getItem('mv-dirty') === '1';

  // If we have unsaved local changes, load from localStorage first
  // then try to push those changes to GitHub
  if (hasDirtyLocal) {
    try {
      const r = localStorage.getItem('mv-assets');
      if (r) {
        data = JSON.parse(r);
        loaded = true;
        isDirty = true;
        // Try to get the latest SHA so we can push our local changes
        if (token) {
          try {
            const meta = await fetch(GH_API, {
              headers: {'Authorization':'Bearer '+token},
              cache: 'no-store'
            });
            if (meta.ok) { const j = await meta.json(); fileSha = j.sha; }
          } catch(e) {}
        }
        updateBadges();
        render();
        showStatus('Loaded unsaved local changes — syncing now…', 'orange');
        updateSyncDot('orange', 'Syncing…');
        persist(); // push local changes to GitHub
        return;
      }
    } catch(e) {}
  }

  // Normal load: GitHub API first (always latest, no cache)
  if (token) {
    try {
      const resp = await fetch(GH_API, {
        headers: {'Authorization':'Bearer '+token, 'Accept':'application/vnd.github.v3+json'},
        cache: 'no-store'
      });
      if (resp.ok) {
        const meta = await resp.json();
        fileSha = meta.sha;
        const text = decodeURIComponent(escape(atob(meta.content.replace(/\n/g,''))));
        data = JSON.parse(text);
        loaded = true;
      }
    } catch(e) { console.warn('GitHub API load failed:', e); }
  }
  // Strategy 2: raw.githubusercontent.com (may be cached up to 5 min)
  if (!loaded) {
    try {
      const resp = await fetch(GH_RAW + '?t=' + Date.now(), {cache:'no-store'});
      if (resp.ok) { data = await resp.json(); loaded = true; }
    } catch(e) {}
  }
  // Strategy 3: localStorage fallback
  if (!loaded) {
    try {
      const r = localStorage.getItem('mv-assets');
      data = r ? JSON.parse(r) : SEED;
    } catch(e) { data = SEED; }
  }
  localStorage.setItem('mv-assets', JSON.stringify(data));
  isDirty = false;
  localStorage.removeItem('mv-dirty');
  updateBadges();
  render();
  if (!token) {
    showStatus('⚠ No GitHub token — changes won\'t sync. Click here to set up.', 'orange', true);
    updateSyncDot('orange', 'No token');
  } else {
    const assets = data.filter(v => v.id !== '_banner');
    showStatus('Loaded ' + assets.length + ' assets from GitHub', 'green');
    updateSyncDot('green', 'Synced');
  }
}

function updateSyncDot(color, text) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const c = color === 'green' ? '#10B981' : color === 'red' ? '#E50914' : '#F59E0B';
  el.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:${c};display:inline-block"></span>${text}`;
  el.style.color = c;
}

async function persist() {
  localStorage.setItem('mv-assets', JSON.stringify(data));
  isDirty = true;
  localStorage.setItem('mv-dirty', '1');
  const token = getToken();
  if (!token) {
    showStatus('⚠ No GitHub token — click here to set up', 'orange', true);
    updateSyncDot('orange', 'Not synced');
    return;
  }
  if (saving) return;
  saving = true;
  showStatus('Syncing to GitHub…', 'orange');
  updateSyncDot('orange', 'Saving…');
  try {
    // Get latest SHA if we don't have it
    if (!fileSha) {
      const meta = await fetch(GH_API, {headers:{'Authorization':'Bearer '+token}});
      if (meta.ok) { const j = await meta.json(); fileSha = j.sha; }
    }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const resp = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'Update assets — ' + new Date().toLocaleString(),
        content: content,
        sha: fileSha
      })
    });
    if (resp.ok) {
      const result = await resp.json();
      fileSha = result.content.sha;
      isDirty = false;
      localStorage.removeItem('mv-dirty');
      showStatus('Synced! Team will see changes shortly.', 'green');
      updateSyncDot('green', 'Synced ✓');
    } else {
      const err = await resp.json();
      if (resp.status === 409) {
        // SHA conflict — refetch SHA and auto-retry once
        const meta2 = await fetch(GH_API, {headers:{'Authorization':'Bearer '+token}});
        if (meta2.ok) { const j2 = await meta2.json(); fileSha = j2.sha; }
        saving = false;
        return persist(); // auto-retry with correct SHA
      } else {
        showStatus('Sync failed: ' + (err.message||'unknown error') + ' — changes saved locally', 'red');
        updateSyncDot('red', 'Not synced');
      }
    }
  } catch(e) {
    showStatus('Offline — changes saved locally, will retry', 'orange');
    updateSyncDot('orange', 'Offline');
  }
  saving = false;
}

function showStatus(msg, color, clickable) {
  let el = document.getElementById('sync-status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sync-status';
    el.style.cssText = 'position:fixed;bottom:16px;right:16px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:999;transition:opacity .3s;box-shadow:0 2px 8px rgba(0,0,0,.15)';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = color === 'green' ? '#ECFDF5' : color === 'red' ? '#FEE2E2' : '#FFF7ED';
  el.style.color = color === 'green' ? '#10B981' : color === 'red' ? '#E50914' : '#F59E0B';
  el.style.border = '1px solid ' + (color === 'green' ? '#10B981' : color === 'red' ? '#E50914' : '#F59E0B');
  el.style.opacity = '1';
  el.style.cursor = clickable ? 'pointer' : 'default';
  el.onclick = clickable ? setupToken : null;
  clearTimeout(el._t);
  if (!clickable) el._t = setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'data.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) { alert('Invalid data.json format'); return; }
      if (!confirm('Replace all current data with imported file? (' + imported.length + ' assets)')) return;
      data = imported;
      persist();
      updateBadges();
      render();
      alert('Imported ' + data.length + ' assets successfully!');
    } catch(err) { alert('Error reading file: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function setCat(c) {
  activeCat = c;
  document.querySelectorAll('.ni').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
  document.getElementById('page-title').textContent = c === 'all' ? 'All Assets' : c === 'star' ? 'Best for Proposals' : c;
  render();
}

function setYr(y) {
  activeYr = y;
  document.querySelectorAll('.chip[data-yr]').forEach(b => b.classList.toggle('on', b.dataset.yr === y));
  render();
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  return data.filter(v => {
    if (v.id === '_banner') return false; // skip config entries
    if (q && !v.title.toLowerCase().includes(q) && !(v.fmt||'').toLowerCase().includes(q) && !(v.tags||'').toLowerCase().includes(q) && !(v.desc||'').toLowerCase().includes(q)) return false;
    if (activeCat === 'star' && !v.star) return false;
    if (activeCat !== 'all' && activeCat !== 'star' && v.cat !== activeCat) return false;
    if (activeYr === 'star' && !v.star) return false;
    if (activeYr !== 'all' && activeYr !== 'star' && v.year !== activeYr) return false;
    return true;
  });
}

function sorted(arr) {
  const s = document.getElementById('sortSel').value;
  return [...arr].sort((a,b) => {
    if (s === 'alpha') return a.title.localeCompare(b.title);
    if (s === 'oldest') return a.year - b.year;
    return b.year - a.year;
  });
}

function updateBadges() {
  const cats = ['all','star',...ALL_CATS];
  cats.forEach(c => {
    const el = document.getElementById('cnt-'+c);
    if (!el) return;
    const assets = data.filter(v => v.id !== '_banner');
    if (c === 'all') el.textContent = assets.length;
    else if (c === 'star') el.textContent = assets.filter(v=>v.star).length;
    else el.textContent = assets.filter(v=>v.cat===c).length;
  });
}

function render() {
  const f = sorted(filtered());
  document.getElementById('result-txt').textContent = f.length + ' assets';

  // stats row — show top 3 cats + proposals
  const topCats = ALL_CATS.map(c=>({c,n:data.filter(v=>v.cat===c).length})).sort((a,b)=>b.n-a.n).slice(0,3);
  document.getElementById('stats-row').innerHTML =
    `<div class="stat"><div class="stat-n">${data.length}</div><div class="stat-l">Total Assets</div></div>` +
    topCats.map(({c,n}) =>
    `<div class="stat"><div class="stat-n">${n}</div><div class="stat-l">${c}</div></div>`
  ).join('') + `<div class="stat"><div class="stat-n">${data.filter(v=>v.star).length}</div><div class="stat-l">Best for Proposals</div></div>`;

  const grid = document.getElementById('grid');
  if (!f.length) {
    grid.innerHTML = `<div class="empty"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg><p>No assets found.<br>Try different filters or add a new asset.</p></div>`;

  }
  grid.innerHTML = f.map(v => {

    return `
    <div class="card">
      <div class="thumb ${hasThumb ? '' : (THUMB_CLASS[v.cat]||'thumb-show')}" onclick="previewAsset(${v.id})" style="cursor:pointer;${hasThumb ? 'background:url(\''+v.thumb+'\') center/cover no-repeat;background-color:#1a1a2e' : ''}">
        ${hasThumb ? '' : '<div class="thumb-bg"></div>'}
        ${hasThumb ? '' : thumbIcon(v.cat)}
        <div class="cat-tag ${CAT_CLASS[v.cat]||'c-show'}">${v.cat}</div>
        ${v.star ? '<div class="star-tag">⭐ Proposal</div>' : ''}
        <div class="overlay"><div class="play"><svg width="14" height="14" fill="white" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
      </div>
      <div class="cbody">
        <div class="ctitle">${v.title}</div>
        ${v.desc ? `<div style="font-size:11px;color:var(--t3);margin-bottom:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${v.desc}</div>` : ''}
        <div class="ctags">

          <span class="tag">${v.year}</span>
        </div>
        <div class="cfoot">
          <span class="yr">${v.year}</span>
          <div class="cfoot-actions">
            <button class="copy-btn" onclick="copyLink('${v.link}',this)">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              Link
            </button>
            <button class="edit-btn" onclick="editAsset(${v.id})" title="Edit">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="copy-btn" onclick="duplicateAsset(${v.id})" title="Duplicate" style="color:#8B5CF6;background:rgba(139,92,246,.08)">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button class="del-btn" onclick="deleteAsset(${v.id})" title="Delete">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>

/* ── Auto-detect thumbnail from video link ─── */
function extractThumbFromLink(link) {
  if (!link) return '';
  // YouTube
  let m = link.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
  if (m) return 'https://img.youtube.com/vi/' + m[1] + '/hqdefault.jpg';
  // Vimeo — can't get thumbnail without API, but we can use vumbnail service
  m = link.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if (m) return 'https://vumbnail.com/' + m[1] + '.jpg';
  return '';
}

function autoFillThumb() {
  const link = document.getElementById('mLink').value.trim();
  const thumbInput = document.getElementById('mThumb');
  const preview = document.getElementById('mThumbPreview');
  // Only auto-fill if user hasn't manually entered a thumb
  if (!thumbInput.value.trim()) {
    const auto = extractThumbFromLink(link);
    if (auto) {
      thumbInput.value = auto;
      preview.innerHTML = `<img src="${auto}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.innerHTML='<svg width=16 height=16 fill=none stroke=#ccc stroke-width=1.5 viewBox=&quot;0 0 24 24&quot;><rect x=3 y=3 width=18 height=18 rx=2/><circle cx=8.5 cy=8.5 r=1.5/><polyline points=&quot;21 15 16 10 5 21&quot;/></svg>'">`;
    }
  } else {
    updateThumbPreview();
  }
}

// Also update preview when user manually types a thumbnail URL
document.addEventListener('DOMContentLoaded', () => {
  const thumbInput = document.getElementById('mThumb');
  if (thumbInput) {
    thumbInput.addEventListener('input', updateThumbPreview);
  }
});

function updateThumbPreview() {
  const url = document.getElementById('mThumb').value.trim();
  const preview = document.getElementById('mThumbPreview');
  if (url) {
    preview.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.innerHTML='<svg width=16 height=16 fill=none stroke=#ccc stroke-width=1.5 viewBox=&quot;0 0 24 24&quot;><rect x=3 y=3 width=18 height=18 rx=2/><circle cx=8.5 cy=8.5 r=1.5/><polyline points=&quot;21 15 16 10 5 21&quot;/></svg>'">`;
  } else {
    preview.innerHTML = '<svg width="16" height="16" fill="none" stroke="#ccc" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
  }
}

function copyLink(link, btn) {
  navigator.clipboard.writeText(link).catch(()=>{});
  const orig = btn.innerHTML;
  btn.innerHTML = `<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
  setTimeout(() => { btn.innerHTML = orig; }, 2000);
}

let editingId = null;

function openModal(isEdit) {
  document.getElementById('modal-title').textContent = isEdit ? 'Edit Asset' : 'Add New Asset';
  document.getElementById('msave').textContent = isEdit ? 'Update Asset' : 'Save Asset';
  document.getElementById('mbg').classList.add('open');
}
function closeModal() {
  document.getElementById('mbg').classList.remove('open');
  editingId = null;
  ['mTitle','mLink','mThumb','mTags','mDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('mStar').checked = false;
  document.getElementById('mThumbPreview').innerHTML = '<svg width="16" height="16" fill="none" stroke="#ccc" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
}

function editAsset(id) {
  const item = data.find(v => v.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById('mTitle').value = item.title;
  document.getElementById('mCat').value = item.cat;
  document.getElementById('mYear').value = item.year;
  document.getElementById('mFmt').value = item.fmt;
  document.getElementById('mLink').value = item.link === '#' ? '' : item.link;
  document.getElementById('mThumb').value = item.thumb || '';
  document.getElementById('mTags').value = item.tags || '';
  document.getElementById('mDesc').value = item.desc || '';
  document.getElementById('mStar').checked = item.star;
  updateThumbPreview();
  openModal(true);
}

function clearCategory() {
  if (activeCat === 'all' || activeCat === 'star') {
    alert('اختار category معينة من الجنب الأول');
    return;
  }
  const count = data.filter(v => v.cat === activeCat).length;
  if (!count) { alert('No assets in this category'); return; }
  if (!confirm('Delete all ' + count + ' assets in "' + activeCat + '"?')) return;
  data = data.filter(v => v.cat !== activeCat);
  persist();
  updateBadges();
  render();
}

function deleteAsset(id) {
  const item = data.find(v => v.id === id);
  if (!item) return;
  if (!confirm('Delete "' + item.title + '"?\n\nThis cannot be undone.')) return;
  data = data.filter(v => v.id !== id);
  persist();
  updateBadges();
  render();
  showStatus('Deleted "' + item.title + '"', 'red');
}

function duplicateAsset(id) {
  const item = data.find(v => v.id === id);
  if (!item) return;
  const copy = { ...item, id: Date.now(), title: item.title + ' (Copy)' };
  data.unshift(copy);
  persist();
  updateBadges();
  render();
  showStatus('Duplicated "' + item.title + '"', 'green');
}

function saveAsset() {
  const title = document.getElementById('mTitle').value.trim();
  if (!title) { document.getElementById('mTitle').focus(); return; }
  const cat = document.getElementById('mCat').value;
  if (!cat) { alert('Please select a category'); document.getElementById('mCat').focus(); return; }
  const linkVal = document.getElementById('mLink').value.trim() || '#';
  let thumbVal = document.getElementById('mThumb').value.trim();
  // Auto-detect thumbnail if not manually set
  if (!thumbVal) thumbVal = extractThumbFromLink(linkVal);
  const obj = {
    title,
    cat: document.getElementById('mCat').value,
    year: document.getElementById('mYear').value,
    fmt: document.getElementById('mFmt').value,
    link: linkVal,
    thumb: thumbVal,
    tags: document.getElementById('mTags').value.trim(),
    desc: document.getElementById('mDesc').value.trim(),
    star: document.getElementById('mStar').checked
  };
  if (editingId) {
    const idx = data.findIndex(v => v.id === editingId);
    if (idx !== -1) { data[idx] = { ...data[idx], ...obj }; }
  } else {
    data.unshift({ id: Date.now(), ...obj });
  }
  persist();
  updateBadges();
  closeModal();
  render();
}

/* ── Preview Modal ─── */
function buildEmbedUrl(link) {
  if (!link || link === '#') return null;
  // YouTube
  let m = link.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]+)/);
  if (m) return 'https://www.youtube.com/embed/' + m[1] + '?autoplay=1';
  // Vimeo
  m = link.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if (m) return 'https://player.vimeo.com/video/' + m[1] + '?autoplay=1';
  // OneDrive / SharePoint embed
  if (link.includes('onedrive.live.com') || link.includes('sharepoint.com') || link.includes('1drv.ms')) {
    if (link.includes('embed')) return link;
    return link.replace('/view','/embed').replace('?e=','?e=');
  }
  // Google Drive
  m = link.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return 'https://drive.google.com/file/d/' + m[1] + '/preview';
  // If already an embed-like URL, return as-is
  if (link.startsWith('http')) return link;
  return null;
}

function previewAsset(id) {
  const item = data.find(v => v.id === id);
  if (!item) return;
  const embedUrl = buildEmbedUrl(item.link);
  const tagArr = (item.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const pbg = document.getElementById('pbg');
  document.getElementById('preview-title').textContent = item.title;
  const body = document.getElementById('preview-body');
  if (embedUrl) {
    body.innerHTML = `<iframe class="preview-frame" src="${embedUrl}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
  } else {
    body.innerHTML = `<div class="preview-nolink"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg><p style="margin-top:12px">No embeddable link available.<br>Add a OneDrive, YouTube, or Vimeo link to enable preview.</p>${item.link && item.link !== '#' ? `<a href="${item.link}" target="_blank" style="color:#E50914;margin-top:10px;display:inline-block;font-size:12px">Open link in new tab →</a>` : ''}</div>`;
  }
  const descEl = document.getElementById('preview-desc');
  descEl.innerHTML = item.desc ? item.desc : '';
  descEl.style.display = item.desc ? 'block' : 'none';
  const tagsEl = document.getElementById('preview-tags');
  tagsEl.innerHTML = tagArr.map(t=>`<span class="tag">${t}</span>`).join('');
  tagsEl.style.display = tagArr.length ? 'flex' : 'none';
  pbg.classList.add('open');
}

function closePreview() {
  const pbg = document.getElementById('pbg');
  pbg.classList.remove('open');
  document.getElementById('preview-body').innerHTML = '';
}

document.getElementById('mbg').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.getElementById('pbg').addEventListener('click', e => { if(e.target===e.currentTarget) closePreview(); });

/* ── LOGIN GATE ─── */
const PASS_HASH = 'd8c2a00be9ea7943df28632340db5858269507f17a1e34814ebcf24c4cc27951';
const SESSION_KEY = 'mv-admin-auth';
const SESSION_HOURS = 8;

async function hashStr(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2,'0')).join('');
}

function isLoggedIn() {
  try {
    const s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if (!s) return false;
    if (Date.now() - s.ts > SESSION_HOURS * 3600000) { sessionStorage.removeItem(SESSION_KEY); return false; }
    return true;
  } catch(e) { return false; }
}

function showApp() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.querySelector('.sidebar').style.display = '';
  document.querySelector('.main').style.display = '';
  load();
}

async function doLogin() {
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  if (!pass) { errEl.textContent = 'Please enter the admin code'; return; }
  const hash = await hashStr(pass);
  if (hash === PASS_HASH) {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ts: Date.now()}));
    showApp();
  } else {
    errEl.textContent = 'Wrong admin code.';
    document.getElementById('loginPass').classList.add('error');
    setTimeout(() => document.getElementById('loginPass').classList.remove('error'), 400);
  }
}

/* ── Banner Settings ─── */
function openBannerSettings() {
  const cfg = data.find(v => v.id === '_banner') || {};
  document.getElementById('bannerUrl').value = cfg.url || '';
  document.getElementById('bannerTitle').value = cfg.title || 'Production Library';
  document.getElementById('bannerSubtitle').value = cfg.subtitle || 'Browse, preview & download production assets';
  updateBannerPreview();
  document.getElementById('bannerBg').style.display = 'flex';
  // Live preview
  document.getElementById('bannerUrl').oninput = updateBannerPreview;
  document.getElementById('bannerTitle').oninput = updateBannerPreview;
}

function updateBannerPreview() {
  const url = document.getElementById('bannerUrl').value;
  const title = document.getElementById('bannerTitle').value;
  const preview = document.getElementById('bannerPreview');
  const previewTitle = document.getElementById('bannerPreviewTitle');
  if (url) {
    preview.style.background = `url('${url}') center/cover no-repeat`;
  } else {
    preview.style.background = 'linear-gradient(135deg,#0f0f0f,#1a1a2e,#0f3460)';
  }
  previewTitle.textContent = title || 'Production Library';
}

function closeBannerSettings() {
  document.getElementById('bannerBg').style.display = 'none';
}

function saveBannerSettings() {
  const url = document.getElementById('bannerUrl').value.trim();
  const title = document.getElementById('bannerTitle').value.trim();
  const subtitle = document.getElementById('bannerSubtitle').value.trim();
  // Remove old config
  data = data.filter(v => v.id !== '_banner');
  // Add new config at the end
  if (url || title !== 'Production Library' || subtitle !== 'Browse, preview & download production assets') {
    data.push({ id: '_banner', url, title, subtitle });
  }
  persist();
  closeBannerSettings();
  showStatus('Banner updated! Team will see it shortly.', 'green');
}

document.getElementById('bannerBg').addEventListener('click', e => { if(e.target===e.currentTarget) closeBannerSettings(); });

if (isLoggedIn()) {
  showApp();
} else {
  document.querySelector('.sidebar').style.display = 'none';
  document.querySelector('.main').style.display = 'none';
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('loginPass').focus();
}
</script>
