<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>almentor – Production Library</title>
<meta name="description" content="almentor production asset library — your gateway to internal video productions, animations, and showreels.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#fff;cursor:pointer}

/* ── CINEMATIC BACKGROUND ── */
.scene{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:1}

/* Dark library shelves effect */
.bg-layer{position:fixed;inset:0;z-index:0}
.bg-gradient{position:absolute;inset:0;background:
  radial-gradient(ellipse 80% 60% at 50% 40%, rgba(30,15,10,0.6) 0%, transparent 70%),
  radial-gradient(ellipse 40% 50% at 20% 50%, rgba(139,69,19,0.08) 0%, transparent 60%),
  radial-gradient(ellipse 40% 50% at 80% 50%, rgba(139,69,19,0.08) 0%, transparent 60%),
  linear-gradient(180deg, #0a0a0a 0%, #0f0908 30%, #0d0a08 60%, #0a0a0a 100%)}

/* Bookshelf lines - vertical pillars of light */
.shelves{position:absolute;inset:0;opacity:0.04}
.shelf{position:absolute;height:100%;background:linear-gradient(180deg,transparent 5%,rgba(180,130,80,0.6) 15%,rgba(180,130,80,0.3) 50%,rgba(180,130,80,0.6) 85%,transparent 95%)}
.shelf:nth-child(1){left:8%;width:2px}
.shelf:nth-child(2){left:18%;width:1.5px}
.shelf:nth-child(3){left:32%;width:1px}
.shelf:nth-child(4){left:48%;width:1px}
.shelf:nth-child(5){left:52%;width:1px}
.shelf:nth-child(6){left:68%;width:1.5px}
.shelf:nth-child(7){left:82%;width:2px}
.shelf:nth-child(8){left:92%;width:1.5px}

/* Horizontal shelf lines */
.hshelf{position:absolute;width:100%;background:rgba(180,130,80,0.03);height:1px}
.hshelf:nth-child(9){top:20%}
.hshelf:nth-child(10){top:40%}
.hshelf:nth-child(11){top:60%}
.hshelf:nth-child(12){top:80%}

/* Warm spotlight from above */
.spotlight{position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(255,180,80,0.07) 0%,rgba(255,140,50,0.03) 30%,transparent 70%);animation:breathe 6s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:0.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}

/* Dust particles */
.particles{position:absolute;inset:0;overflow:hidden}
.particle{position:absolute;background:rgba(255,200,120,0.15);border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) translateX(0) scale(0);opacity:0}10%{opacity:1;transform:translateY(90vh) translateX(10px) scale(1)}90%{opacity:0.5}100%{transform:translateY(-10vh) translateX(-20px) scale(0.3);opacity:0}}

/* Film grain overlay */
.grain{position:absolute;inset:0;opacity:0.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");animation:grain 0.5s steps(4) infinite}
@keyframes grain{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,2px)}50%{transform:translate(2px,-2px)}75%{transform:translate(-2px,-2px)}}

/* Vignette */
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,transparent 40%,rgba(0,0,0,0.7) 100%)}

/* ── CONTENT ── */
.content{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:20px;animation:fadeIn 2s ease;padding:20px}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Logo */
.logo-wrap{margin-bottom:12px}
.logo-svg{height:36px;fill:#fff;filter:drop-shadow(0 2px 12px rgba(255,180,80,0.2));transition:all 0.6s ease}
body:hover .logo-svg{filter:drop-shadow(0 4px 24px rgba(229,9,20,0.4))}

/* Red accent line */
.accent-line{width:60px;height:2px;background:linear-gradient(90deg,transparent,#E50914,transparent);margin:0 auto;animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:0.5;width:60px}50%{opacity:1;width:100px}}

/* Title */
.title{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:800;letter-spacing:-1px;line-height:1.1;text-shadow:0 2px 30px rgba(0,0,0,0.8)}
.title span{display:block;font-size:clamp(13px,2vw,18px);font-weight:400;font-family:'DM Sans',sans-serif;color:rgba(255,255,255,0.4);letter-spacing:4px;text-transform:uppercase;margin-top:10px}

/* Enter button */
.enter-btn{margin-top:20px;padding:14px 48px;border:1px solid rgba(255,255,255,0.12);border-radius:50px;background:rgba(255,255,255,0.04);backdrop-filter:blur(10px);color:rgba(255,255,255,0.7);font-size:14px;font-family:'DM Sans',sans-serif;letter-spacing:2px;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:10px;transition:all 0.5s ease;cursor:pointer}
.enter-btn:hover{background:rgba(229,9,20,0.15);border-color:rgba(229,9,20,0.4);color:#fff;transform:scale(1.04);box-shadow:0 0 40px rgba(229,9,20,0.15)}
.enter-btn svg{transition:transform 0.4s ease}
.enter-btn:hover svg{transform:translateX(4px)}

/* Bottom tagline */
.tagline{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:3px;text-transform:uppercase;z-index:3}

/* Click anywhere hint */
.hint{font-size:12px;color:rgba(255,255,255,0.2);animation:pulse 2.5s ease-in-out infinite;margin-top:8px}
@keyframes pulse{0%,100%{opacity:0.2}50%{opacity:0.5}}

/* Film strip decoration */
.film-strip{position:fixed;z-index:1}
.film-strip-left{left:0;top:0;bottom:0;width:28px;background:repeating-linear-gradient(180deg,transparent,transparent 18px,rgba(255,255,255,0.015) 18px,rgba(255,255,255,0.015) 20px);border-right:1px solid rgba(255,255,255,0.03)}
.film-strip-right{right:0;top:0;bottom:0;width:28px;background:repeating-linear-gradient(180deg,transparent,transparent 18px,rgba(255,255,255,0.015) 18px,rgba(255,255,255,0.015) 20px);border-left:1px solid rgba(255,255,255,0.03)}

/* Mobile */
@media(max-width:600px){
  .film-strip{display:none}
  .enter-btn{padding:12px 36px;font-size:12px}
  .tagline{font-size:9px;bottom:20px}
}
</style>
</head>

    <div class="shelf"></div><div class="shelf"></div><div class="shelf"></div><div class="shelf"></div>
    <div class="hshelf"></div><div class="hshelf"></div><div class="hshelf"></div><div class="hshelf"></div>

</div>

<!-- FILM STRIP EDGES -->

<div class="scene">

    </div>

    <div class="accent-line"></div>

    <h1 class="title">
      Production Library

    <a class="enter-btn" href="browse.html" onclick="event.stopPropagation()">

      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>

</div>

<div class="tagline">almentor production &nbsp;·&nbsp; internal use only</div>

<script>
// Generate floating dust particles
const container = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 3 + 1;
  p.style.width = size + 'px';
  p.style.height = size + 'px';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (Math.random() * 15 + 10) + 's';
  p.style.animationDelay = (Math.random() * 10) + 's';
  container.appendChild(p);
}
</script>
